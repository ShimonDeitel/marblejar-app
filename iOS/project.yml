name: Marble Jar
options:
  bundleIdPrefix: com.shimondeitel.marblejar
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Marble Jar:
    type: application
    platform: iOS
    sources:
      - path: Marble Jar
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.marblejar
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Marble Jar/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  Marble JarTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Marble JarTests
      - path: Marble Jar.storekit
    dependencies:
      - target: Marble Jar
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.marblejar.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  Marble JarUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Marble JarUITests
    dependencies:
      - target: Marble Jar
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.marblejar.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Marble Jar:
    build:
      targets:
        Marble Jar: all
        Marble JarTests: [test]
        Marble JarUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Marble Jar.storekit
    test:
      config: Debug
      storeKitConfiguration: Marble Jar.storekit
      targets:
        - Marble JarTests
        - Marble JarUITests
    archive:
      config: Release
